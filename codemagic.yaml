workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: cosmira_asc_api_key
    environment:
      groups:
        - cosmira_env
      ios_signing:
        provisioning_profiles:
          - cosmira_app_store_profile
        certificates:
          - cosmira_distribution_cert
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Generate Xcode configuration files
        script: flutter build ios --release --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=REVENUECAT_API_KEY=$REVENUECAT_API_KEY \
            --dart-define=SPOTIFY_CLIENT_ID=$SPOTIFY_CLIENT_ID \
            --dart-define=SPOTIFY_REDIRECT_URI=$SPOTIFY_REDIRECT_URI \
            --dart-define=ADMOB_BANNER_ID=$ADMOB_BANNER_ID \
            --dart-define=ADMOB_REWARDED_ID=$ADMOB_REWARDED_ID \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - ezgitheozdemir@outlook.com
        notify:
          success: true
          failure: true
